name: CI

on:
  push:
    branches: [main, stg]
  pull_request:
    branches: [main, stg]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/heydb/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
